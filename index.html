<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Geostatic Automático Pro</title>
    <script src="https://unpkg.com/mapillary-js@4.1.0/dist/mapillary.js"></script>
    <link href="https://unpkg.com/mapillary-js@4.1.0/dist/mapillary.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #000; }
        #mly { width: 100%; height: 100%; }
        #ui-top {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 15px;
        }
        .pill { background: rgba(0,0,0,0.85); color: white; padding: 12px 25px; border-radius: 30px; font-weight: bold; border: 1px solid #444; }
        #map-container { 
            position: absolute; bottom: 20px; right: 20px; z-index: 1000; 
            width: 320px; height: 240px; border-radius: 15px; overflow: hidden; 
            border: 3px solid white; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #map-container:hover { width: 550px; height: 400px; }
        #map { width: 100%; height: 100%; background: #ddd; }
        #guess-btn { 
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 1001;
            padding: 12px 30px; background: #6528e0; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="ui-top">
        <div class="pill">Pontos: <span id="score">0</span></div>
        <div class="pill" id="status">Procurando local...</div>
    </div>

    <div id="mly"></div>

    <div id="map-container">
        <div id="map"></div>
        <button id="guess-btn" onclick="confirmGuess()">CHUTAR</button>
    </div>

    <script>
        // --- SEU TOKEN CONFIGURADO ---
        const MAPILLARY_TOKEN = 'MLY|26083788811293996|39b21b5a6a8fd65dea5e9f827f832ceb'; 

        let score = 0;
        let currentImgPos = { lat: 0, lng: 0 };
        let userClick = null;
        let userMarker = null;
        let mlyViewer = null;

        const map = L.map('map', { zoomControl: false }).setView([20, 0], 1);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        map.on('click', (e) => {
            userClick = e.latlng;
            if (userMarker) userMarker.setLatLng(userClick);
            else userMarker = L.marker(userClick).addTo(map);
        });

        async function fetchRandomStreetView() {
            document.getElementById('status').innerText = "Viajando...";
            
            // Tenta achar coordenadas aleatórias em áreas terrestres prováveis
            const lat = (Math.random() * 120) - 50; 
            const lng = (Math.random() * 360) - 180;

            const url = `https://graph.mapillary.com/images?access_token=${MAPILLARY_TOKEN}&fields=id,geometry&is_pano=true&bbox=${lng-1},${lat-1},${lng+1},${lat+1}&limit=1`;

            try {
                const res = await fetch(url);
                const json = await res.json();

                if (json.data && json.data.length > 0) {
                    const img = json.data[0];
                    currentImgPos = { lat: img.geometry.coordinates[1], lng: img.geometry.coordinates[0] };
                    
                    if (!mlyViewer) {
                        mlyViewer = new mapillary.Viewer({
                            accessToken: MAPILLARY_TOKEN,
                            container: 'mly',
                            imageId: img.id,
                        });
                    } else {
                        mlyViewer.moveTo(img.id);
                    }
                    document.getElementById('status').innerText = "Onde você está?";
                } else {
                    fetchRandomStreetView(); 
                }
            } catch (err) {
                console.error(err);
                fetchRandomStreetView();
            }
        }

        function confirmGuess() {
            if (!userClick) return alert("Marque um lugar no mapa!");
            
            const realPos = L.latLng(currentImgPos.lat, currentImgPos.lng);
            const dist = map.distance(userClick, realPos) / 1000;
            
            let points = Math.max(0, Math.round(5000 * Math.exp(-dist / 2000)));
            score += points;
            document.getElementById('score').innerText = score;

            alert(`Distância: ${Math.round(dist)}km\nPontos: ${points}`);
            
            if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
            userClick = null;
            fetchRandomStreetView();
        }

        fetchRandomStreetView();
    </script>
</body>
</html>
